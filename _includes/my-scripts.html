<script>
  (function () {
    function toggleDrawer(event) {
      var drawer = document.getElementById("_drawer");

      if (!drawer) return;

      event.preventDefault();
      event.stopPropagation();

      if (typeof event.stopImmediatePropagation === "function") {
        event.stopImmediatePropagation();
      }

      if (typeof drawer.toggle === "function") {
        drawer.toggle();
        return;
      }

      if (drawer.hasAttribute("opened")) {
        drawer.removeAttribute("opened");
      } else {
        drawer.setAttribute("opened", "");
      }
    }

    function bindDrawerMenu() {
      var menu = document.getElementById("_menu");

      if (!menu || menu.dataset.drawerBound === "true") {
        return;
      }

      menu.dataset.drawerBound = "true";
      menu.addEventListener("click", toggleDrawer, true);
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", bindDrawerMenu, { once: true });
    } else {
      bindDrawerMenu();
    }

    document.addEventListener("hy-push-state-load", bindDrawerMenu);
  })();
</script>
