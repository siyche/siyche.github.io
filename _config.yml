lang: en
title: Stephen Chen
short_title: Stephen
description: Personal site for writing, experiments, and selected work.
tagline: Thoughtful web work, notes in progress, and the projects worth keeping.
url: "https://siyche.github.io"
baseurl: ""
timezone: America/Denver

author:
  name: Stephen Chen
  about: >
    I use this site to collect writing, experiments, and the work I want to
    stay visible after the launch rush fades.
  social:
    github: siyche

accent_image: /assets/img/sidebar-bg.jpg
accent_color: rgb(198,108,73)
theme_color: rgb(17,39,52)

menu:
  - title: About
    url: /about/
  - title: Journal
    url: /journal/
  - title: GitHub
    url: https://github.com/siyche
    external: true
    rel: me noopener noreferrer

permalink: pretty
markdown: kramdown

plugins:
  - jekyll-include-cache

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post

hydejack:
  no_search: true
  no_break_layout: true
  cookies_banner: false
  advertise: false
  hide_dates: false
  hide_last_modified: false

  dark_mode:
    always: false
    dynamic: true
    sunrise: 6
    sunset: 18
    icon: true

sass:
  style: compressed
